name: Example 1 LocalNet tests

on:
  push:
    paths:
      - "example-1/**"
      - ".github/workflows/example-1-localnet-tests.yml"
  pull_request:
    paths:
      - "example-1/**"
      - ".github/workflows/example-1-localnet-tests.yml"

defaults:
  run:
    working-directory: example-1

jobs:
  localnet-tests:
    runs-on: self-hosted

    env:
      DEVKIT_VERSION: v0.12.2
      SPLICE_VERSION: "0.6.4"
      INSTANCE: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install canton-devkit
        run: |
          set -euo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) platform=linux_amd64 ;;
            Linux-aarch64|Linux-arm64) platform=linux_arm64 ;;
            Darwin-arm64) platform=darwin_arm64 ;;
            Darwin-x86_64) platform=darwin_amd64 ;;
            *) echo "Unsupported runner platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          asset="canton-devkit_${DEVKIT_VERSION}_${platform}.tar.gz"
          base="https://github.com/bitdynamics-ab/canton-devkit/releases/download/${DEVKIT_VERSION}"
          curl -fL -o "${asset}" "${base}/${asset}"
          curl -fL -o SHA256SUMS "${base}/SHA256SUMS"
          if command -v sha256sum >/dev/null 2>&1; then
            grep " ${asset}\$" SHA256SUMS | sha256sum -c -
          else
            grep " ${asset}\$" SHA256SUMS | shasum -a 256 -c -
          fi
          tar -xzf "${asset}"
          chmod +x canton-devkit
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"
          mv canton-devkit "${install_dir}/"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          canton-devkit version

      - name: Install DPM
        run: |
          curl -fsSL https://get.digitalasset.com/install/dpm/install.sh | sh
          echo "$HOME/.dpm/bin" >> "${GITHUB_PATH}"
          dpm --version
          dpm install package

      - name: Host preflight
        run: canton-devkit localnet doctor

      - name: Start LocalNet
        run: |
          canton-devkit localnet up \
            --name "${INSTANCE}" \
            --version "${SPLICE_VERSION}"

      - name: Export LocalNet environment
        run: |
          canton-devkit localnet env \
            --name "${INSTANCE}" \
            --include-jwt \
            --format github-env >> "${GITHUB_ENV}"

      - name: Build and upload DAR
        run: |
          dpm build
          canton-devkit localnet dar upload "$(ls .daml/dist/*.dar | head -1)" \
            --instance "${INSTANCE}" \
            --all-participants

      - name: Run tests
        run: |
          dpm test
          npm install
          npm test

      - name: Tear down LocalNet
        if: always()
        run: canton-devkit localnet clean --name "${INSTANCE}" --force || true
